<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>

    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.06" stroke="#22d3ee" stroke-width="0.6">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="490" x2="1200" y2="490"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>

    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
  </g>

  <!-- Center Glow Line -->
  <rect x="0" y="315" width="1200" height="2" fill="url(#glow)"/>

  <!-- Status Indicator -->
  <circle cx="100" cy="200" r="6" fill="#22d3ee" opacity="0.9"/>
  <text x="120" y="205" fill="#94a3b8" font-family="monospace" font-size="14" letter-spacing="3">
    SYSTEMS ONLINE
  </text>

  <!-- Name -->
  <text x="100" y="290"
        fill="#f8fafc"
        font-family="'Work Sans', sans-serif"
        font-size="60"
        font-weight="700">
        Sarthak Handa
  </text>

  <!-- Core Identity -->
  <text x="100" y="345"
        fill="#22d3ee"
        font-family="monospace"
        font-size="20"
        letter-spacing="2">
        BUSINESS INTELLIGENCE · AUTOMATION · SYSTEM ARCHITECTURE
  </text>

  <!-- Authority Line -->
  <text x="100" y="385"
        fill="#64748b"
        font-family="monospace"
        font-size="15"
        letter-spacing="2">
        APIs · Reporting Ecosystems · Audit-Safe Planning Systems
  </text>

  <!-- Bottom Bar -->
  <text x="100" y="520"
        fill="#475569"
        font-family="monospace"
        font-size="13"
        letter-spacing="2">
        SH-INTERFACE v4.0 | OPERATIONAL | INDIA
  </text>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630"
        fill="none"
        stroke="#22d3ee"
        stroke-width="1"
        opacity="0.25"/>
</svg>
